<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>批量图片处理工具</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="图片处理工具">
        <div>
          <p class="eyebrow">Image Processing</p>
          <h1>批量图片处理工具</h1>
        </div>
        <div class="actions">
          <label class="button secondary" for="folderInput">
            <span aria-hidden="true">+</span>
            选择输入文件夹
          </label>
          <button id="chooseOutputButton" class="button secondary" type="button">
            <span aria-hidden="true">□</span>
            选择输出文件夹
          </button>
          <button id="processButton" class="button primary" type="button" disabled>
            <span aria-hidden="true">▶</span>
            开始处理
          </button>
          <button id="downloadAllButton" class="button secondary" type="button" disabled>
            <span aria-hidden="true">↓</span>
            下载全部
          </button>
        </div>
        <input id="folderInput" type="file" accept="image/jpeg,image/png" webkitdirectory directory multiple />
      </section>

      <section class="mode-panel" aria-label="尺寸模式">
        <div>
          <span class="label">尺寸模式</span>
          <strong id="modeSummary">1000 × 1000 白底居中</strong>
        </div>
        <div class="segmented-control" role="radiogroup" aria-label="选择尺寸模式">
          <label>
            <input type="radio" name="sizeMode" value="square" checked />
            <span>1000 × 1000</span>
          </label>
          <label>
            <input type="radio" name="sizeMode" value="wide1920" />
            <span>宽 1920 等比</span>
          </label>
          <label>
            <input type="radio" name="sizeMode" value="wide750" />
            <span>宽 750 等比</span>
          </label>
        </div>
      </section>

      <section class="status-band" aria-live="polite">
        <div>
          <span class="label">已选择图片</span>
          <strong id="imageCount">0</strong>
        </div>
        <div>
          <span class="label">输出尺寸</span>
          <strong id="sizeSummary">1000 × 1000 JPG</strong>
        </div>
        <div>
          <span class="label">输出格式</span>
          <strong id="formatSummary">JPG 95</strong>
        </div>
      </section>

      <section class="option-panel" aria-label="处理选项">
        <label class="toggle-row">
          <input id="removeBackgroundInput" type="checkbox" />
          <span class="toggle-visual" aria-hidden="true"></span>
          <span>
            <strong>去背</strong>
            <small>适合纯色或接近纯色背景，开启后输出透明 PNG</small>
          </span>
        </label>
      </section>

      <section class="path-band">
        <div>
          <span class="label">输入方式</span>
          <strong>整个文件夹，可包含子文件夹</strong>
        </div>
        <div>
          <span class="label">输出位置</span>
          <strong id="outputFolderName">尚未选择输出文件夹</strong>
        </div>
      </section>

      <section class="workspace">
        <div class="panel">
          <div class="panel-header">
            <h2>待处理图片</h2>
            <button id="clearButton" class="icon-button" type="button" aria-label="清空列表" title="清空列表">
              ×
            </button>
          </div>
          <ul id="imageList" class="image-list"></ul>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h2>处理结果</h2>
            <span id="statusText" class="status-text">等待文件夹</span>
          </div>
          <div id="resultList" class="result-list"></div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
